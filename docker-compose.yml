version: "3.9"

services:
  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./data:/app/data
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ui:
    build: .
    command: python app.py
    ports:
      - "7860:7860"
    volumes:
      - ./checkpoints:/app/checkpoints
    depends_on:
      - api
    environment:
      - CUDA_VISIBLE_DEVICES=0
